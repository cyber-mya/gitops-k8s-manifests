apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: gitops-app
        image: aderixxe/gitops-app:fb11603b5b27c329baf19d598a29a32b9210b7c2
        ports:
        - containerPort: 3000
