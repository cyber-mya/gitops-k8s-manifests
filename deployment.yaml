apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: gitops-app
        image: aderixxe/gitops-app:3c643f1f35d07adab88323b9a68c071e4a783bd1
        ports:
        - containerPort: 3000
