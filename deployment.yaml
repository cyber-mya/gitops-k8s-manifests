apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
      - name: gitops-app
        image: aderixxe/gitops-app:3b2a89b83ba9558d002420ec76b845740360576f
        ports:
        - containerPort: 3000
